<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events Admin – Grant Beach NA</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark: #2e6b35;
      --green-mid:  #3d8c45;
      --green-light:#f0f5f0;
      --text:       #2d3a2e;
      --muted:      #6b8c6e;
      --border:     #d4e2d5;
      --white:      #ffffff;
      --danger:     #c0392b;
      --warning:    #e07b2a;
      --radius:     10px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f4f7f2;
      color: var(--text);
      min-height: 100vh;
    }

    /* ── PIN Screen ── */
    #pinScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .pin-card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.1);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }
    .pin-logo {
      width: 56px; height: 56px;
      background: var(--green-dark);
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      margin-bottom: 1rem;
    }
    .pin-card h1 { font-size: 1.2rem; color: var(--green-dark); margin-bottom: .25rem; }
    .pin-card p  { font-size: .85rem; color: var(--muted); margin-bottom: 1.5rem; }

    .pin-dots {
      display: flex;
      justify-content: center;
      gap: .6rem;
      margin-bottom: 1.25rem;
    }
    .pin-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--white);
      transition: all .15s;
    }
    .pin-dot.filled { background: var(--green-dark); border-color: var(--green-dark); }

    .pin-keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .5rem;
      margin-bottom: 1rem;
    }
    .pin-key {
      padding: .85rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--white);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: all .12s;
      -webkit-tap-highlight-color: transparent;
    }
    .pin-key:hover, .pin-key:active { background: var(--green-light); border-color: var(--green-dark); }
    .pin-key.clear { color: var(--danger); font-size: .9rem; }
    .pin-key.zero   { grid-column: 2; }

    .pin-error {
      color: var(--danger);
      font-size: .82rem;
      min-height: 1.2em;
      margin-top: -.25rem;
    }

    /* ── Admin Shell ── */
    #adminShell { display: none; }

    .admin-header {
      background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
      color: #fff;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .admin-header h1 { font-size: 1.05rem; font-weight: 700; }
    .admin-header-actions { display: flex; gap: .6rem; align-items: center; flex-wrap: wrap; }

    .btn {
      padding: .45rem 1rem;
      border-radius: 99px;
      border: none;
      font-size: .82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      display: inline-flex;
      align-items: center;
      gap: .35rem;
    }
    .btn-white   { background: rgba(255,255,255,.15); color: #fff; border: 1.5px solid rgba(255,255,255,.4); }
    .btn-white:hover { background: rgba(255,255,255,.28); }
    .btn-primary { background: var(--green-dark); color: #fff; }
    .btn-primary:hover { background: #235228; }
    .btn-success { background: #27ae60; color: #fff; }
    .btn-success:hover { background: #1e9450; }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #a93226; }
    .btn-outline { background: var(--white); color: var(--green-dark); border: 1.5px solid var(--green-dark); }
    .btn-outline:hover { background: var(--green-light); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Status Banner ── */
    .status-banner {
      padding: .7rem 1.5rem;
      font-size: .83rem;
      font-weight: 600;
      display: none;
      align-items: center;
      gap: .5rem;
    }
    .status-banner.success { background: #d4edda; color: #155724; display: flex; }
    .status-banner.error   { background: #f8d7da; color: #721c24; display: flex; }
    .status-banner.info    { background: #d1ecf1; color: #0c5460; display: flex; }

    /* ── Main Layout ── */
    .admin-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.25rem 1rem 3rem;
    }

    /* ── Event List ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      gap: .5rem;
    }
    .section-header h2 { font-size: 1rem; color: var(--green-dark); }

    .event-count {
      font-size: .78rem;
      color: var(--muted);
      background: var(--green-light);
      padding: .2rem .6rem;
      border-radius: 99px;
    }

    #eventTable {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
      overflow: hidden;
      margin-bottom: 1.5rem;
    }

    .event-row {
      display: grid;
      grid-template-columns: 70px 1fr auto;
      gap: 1rem;
      padding: .85rem 1.1rem;
      border-bottom: 1px solid var(--green-light);
      align-items: center;
    }
    .event-row:last-child { border-bottom: none; }
    .event-row:hover { background: #fafcfa; }

    .event-row-date {
      text-align: center;
      background: var(--green-light);
      border-radius: 7px;
      padding: .4rem .2rem;
    }
    .event-row-date .rm { font-size: .6rem; font-weight: 700; text-transform: uppercase; color: var(--green-dark); }
    .event-row-date .rd { font-size: 1.3rem; font-weight: 800; color: var(--text); line-height: 1.1; }
    .event-row-date .ry { font-size: .6rem; color: var(--muted); }

    .event-row-info .event-row-title {
      font-size: .9rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: .4rem;
      flex-wrap: wrap;
    }
    .cat-pill {
      font-size: .6rem;
      padding: 1px 6px;
      border-radius: 99px;
      color: #fff;
      font-weight: 700;
    }
    .event-row-meta { font-size: .78rem; color: var(--muted); margin-top: .2rem; }

    .event-row-actions { display: flex; gap: .4rem; }
    .icon-btn {
      width: 32px; height: 32px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--white);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem;
      transition: all .12s;
    }
    .icon-btn:hover { border-color: var(--green-dark); background: var(--green-light); }
    .icon-btn.delete:hover { border-color: var(--danger); background: #fdf0ef; }

    .empty-state {
      text-align: center;
      padding: 2.5rem;
      color: var(--muted);
    }
    .empty-state p { font-size: .9rem; }

    /* ── Publish Bar ── */
    .publish-bar {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: .75rem;
      margin-bottom: 1.5rem;
    }
    .publish-bar p { font-size: .85rem; color: var(--muted); }
    .publish-bar p strong { color: var(--text); }
    .unsaved-badge {
      display: inline-block;
      background: var(--warning);
      color: #fff;
      font-size: .7rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 99px;
      margin-left: .4rem;
    }

    /* ── Modal / Drawer ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 100;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    @media (min-width: 600px) {
      .modal-overlay { align-items: center; }
    }

    .modal {
      background: var(--white);
      border-radius: 16px 16px 0 0;
      padding: 1.5rem 1.25rem 2rem;
      width: 100%;
      max-width: 560px;
      max-height: 92vh;
      overflow-y: auto;
    }
    @media (min-width: 600px) {
      .modal { border-radius: 16px; }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .modal-header h3 { font-size: 1rem; color: var(--green-dark); }
    .modal-close {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: var(--muted);
      padding: .2rem;
    }

    .form-group { margin-bottom: 1rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
    label { display: block; font-size: .8rem; font-weight: 600; color: var(--text); margin-bottom: .3rem; }
    label .req { color: var(--danger); }

    input, select, textarea {
      width: 100%;
      padding: .55rem .75rem;
      border: 1.5px solid var(--border);
      border-radius: 7px;
      font-size: .88rem;
      font-family: inherit;
      color: var(--text);
      background: var(--white);
      transition: border-color .15s;
      -webkit-appearance: none;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--green-dark);
    }
    textarea { resize: vertical; min-height: 72px; }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: .6rem;
      margin-top: 1.25rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    /* ── Change PIN section ── */
    .change-pin-section {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
      padding: 1.1rem 1.25rem;
    }
    .change-pin-section h3 { font-size: .9rem; color: var(--green-dark); margin-bottom: .75rem; }
    .pin-input-row { display: flex; gap: .6rem; align-items: flex-end; flex-wrap: wrap; }
    .pin-input-row .form-group { flex: 1; min-width: 120px; margin: 0; }

    @media (max-width: 420px) {
      .event-row { grid-template-columns: 56px 1fr; }
      .event-row-actions { grid-column: 2; justify-content: flex-end; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ══ PIN SCREEN ══ -->
<div id="pinScreen">
  <div class="pin-card">
    <div class="pin-logo">🏘️</div>
    <h1>Grant Beach NA</h1>
    <p>Events Admin — Enter your PIN to continue</p>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
      <div class="pin-dot"></div>
    </div>
    <div class="pin-keypad">
      <button class="pin-key" data-val="1">1</button>
      <button class="pin-key" data-val="2">2</button>
      <button class="pin-key" data-val="3">3</button>
      <button class="pin-key" data-val="4">4</button>
      <button class="pin-key" data-val="5">5</button>
      <button class="pin-key" data-val="6">6</button>
      <button class="pin-key" data-val="7">7</button>
      <button class="pin-key" data-val="8">8</button>
      <button class="pin-key" data-val="9">9</button>
      <button class="pin-key clear" data-val="clear">✕</button>
      <button class="pin-key zero" data-val="0">0</button>
      <button class="pin-key" data-val="back">⌫</button>
    </div>
    <div class="pin-error" id="pinError"></div>
  </div>
</div>

<!-- ══ ADMIN SHELL ══ -->
<div id="adminShell">
  <div class="admin-header">
    <div>
      <h1>🏘️ Grant Beach NA — Events Manager</h1>
    </div>
    <div class="admin-header-actions">
      <button class="btn btn-white" id="refreshBtn">⟳ Refresh</button>
      <button class="btn btn-white" id="lockBtn">🔒 Lock</button>
    </div>
  </div>

  <div class="status-banner" id="statusBanner"></div>

  <div class="admin-wrap">

    <!-- Publish Bar -->
    <div class="publish-bar" id="publishBar">
      <p id="publishStatus">Events loaded. <strong>Make changes below, then publish.</strong></p>
      <button class="btn btn-success" id="publishBtn">🚀 Publish Changes</button>
    </div>

    <!-- Event List -->
    <div class="section-header">
      <h2>Current Events <span class="event-count" id="eventCount">0 events</span></h2>
      <button class="btn btn-primary" id="addEventBtn">+ Add Event</button>
    </div>

    <div id="eventTable">
      <div class="empty-state"><p>Loading events…</p></div>
    </div>

    <!-- Change PIN -->
    <div class="change-pin-section">
      <h3>🔑 Change Admin PIN</h3>
      <div class="pin-input-row">
        <div class="form-group">
          <label>New PIN (4–8 digits)</label>
          <input type="password" id="newPin" placeholder="e.g. 7823" inputmode="numeric" maxlength="8" />
        </div>
        <div class="form-group">
          <label>Confirm PIN</label>
          <input type="password" id="confirmPin" placeholder="Repeat PIN" inputmode="numeric" maxlength="8" />
        </div>
        <button class="btn btn-outline" id="changePinBtn">Save PIN</button>
      </div>
    </div>

  </div>
</div>

<!-- ══ ADD / EDIT MODAL ══ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-header">
      <h3 id="modalTitle">Add Event</h3>
      <button class="modal-close" id="modalClose" aria-label="Close">✕</button>
    </div>

    <form id="eventForm" novalidate>
      <input type="hidden" id="editIndex" value="" />

      <div class="form-group">
        <label for="fTitle">Event Title <span class="req">*</span></label>
        <input type="text" id="fTitle" placeholder="e.g. Monthly Neighborhood Meeting" required />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="fDate">Date <span class="req">*</span></label>
          <input type="date" id="fDate" required />
        </div>
        <div class="form-group">
          <label for="fCategory">Category <span class="req">*</span></label>
          <select id="fCategory" required>
            <option value="">— Select —</option>
            <option value="meeting">Meeting</option>
            <option value="social">Social</option>
            <option value="cleanup">Cleanup</option>
            <option value="safety">Safety</option>
            <option value="kids">Kids / Family</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="fTime">Start Time</label>
          <input type="time" id="fTime" />
        </div>
        <div class="form-group">
          <label for="fEndTime">End Time</label>
          <input type="time" id="fEndTime" />
        </div>
      </div>

      <div class="form-group">
        <label for="fLocation">Location <span class="req">*</span></label>
        <input type="text" id="fLocation" placeholder="e.g. Grant Beach Park – Pavilion 1" required />
      </div>

      <div class="form-group">
        <label for="fDesc">Description</label>
        <textarea id="fDesc" placeholder="Brief description visible to residents…"></textarea>
      </div>

      <div class="form-group">
        <label for="fLink">More Info URL (optional)</label>
        <input type="url" id="fLink" placeholder="https://www.facebook.com/grantbeachna" />
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-outline" id="modalCancelBtn">Cancel</button>
        <button type="submit" class="btn btn-primary" id="modalSaveBtn">Save Event</button>
      </div>
    </form>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  Config
// ─────────────────────────────────────────────
const API_GET    = "/api/events";
const API_UPDATE = "/api/update-events";

const CAT_COLORS = {
  meeting: "#2e6b35", social: "#e07b2a", cleanup: "#4a90a4",
  safety: "#c0392b", kids: "#8e44ad", other: "#7f8c8d"
};
const CAT_LABELS = {
  meeting:"Meeting", social:"Social", cleanup:"Cleanup",
  safety:"Safety", kids:"Kids/Family", other:"Other"
};
const MONTHS_SHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
let events = [];
let isDirty = false;
let sessionPin = null;

// ─────────────────────────────────────────────
//  PIN Logic
// ─────────────────────────────────────────────
let pinBuffer = "";

function renderPinDots() {
  document.querySelectorAll(".pin-dot").forEach((d, i) => {
    d.classList.toggle("filled", i < pinBuffer.length);
  });
}

document.querySelectorAll(".pin-key").forEach(btn => {
  btn.addEventListener("click", () => {
    const val = btn.dataset.val;
    if (val === "clear") { pinBuffer = ""; }
    else if (val === "back") { pinBuffer = pinBuffer.slice(0, -1); }
    else if (pinBuffer.length < 8) { pinBuffer += val; }
    renderPinDots();
    document.getElementById("pinError").textContent = "";

    if (pinBuffer.length >= 4) {
      verifyPin(pinBuffer);
    }
  });
});

async function verifyPin(pin) {
  // Try the PIN against the server
  const res = await fetch(API_UPDATE, {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-Admin-Pin": pin },
    body: JSON.stringify([]) // Empty test payload
  });

  if (res.ok || (await res.json().catch(() => ({}))).saved === 0 || res.status === 200) {
    // Server accepted — but we sent empty array, re-fetch actual events
    sessionPin = pin;
    enterAdmin();
  } else {
    // Wrong PIN
    pinBuffer = "";
    renderPinDots();
    document.getElementById("pinError").textContent = "Incorrect PIN. Please try again.";
    // Shake animation
    const card = document.querySelector(".pin-card");
    card.style.animation = "none";
    setTimeout(() => card.style.removeProperty("animation"), 10);
  }
}

// ─────────────────────────────────────────────
//  Admin Shell
// ─────────────────────────────────────────────
async function enterAdmin() {
  document.getElementById("pinScreen").style.display = "none";
  document.getElementById("adminShell").style.display = "block";
  await loadEvents();
}

function lockAdmin() {
  sessionPin = null;
  pinBuffer = "";
  renderPinDots();
  document.getElementById("pinError").textContent = "";
  document.getElementById("adminShell").style.display = "none";
  document.getElementById("pinScreen").style.display = "flex";
}

document.getElementById("lockBtn").addEventListener("click", lockAdmin);
document.getElementById("refreshBtn").addEventListener("click", loadEvents);

// ─────────────────────────────────────────────
//  Load Events
// ─────────────────────────────────────────────
async function loadEvents() {
  showBanner("info", "Loading events…");
  try {
    const res = await fetch(API_GET + "?t=" + Date.now());
    if (!res.ok) throw new Error("Server error " + res.status);
    events = await res.json();
    isDirty = false;
    renderEventTable();
    hideBanner();
  } catch (err) {
    showBanner("error", "Could not load events: " + err.message);
  }
}

// ─────────────────────────────────────────────
//  Render Events Table
// ─────────────────────────────────────────────
function renderEventTable() {
  const table = document.getElementById("eventTable");
  document.getElementById("eventCount").textContent = events.length + " event" + (events.length !== 1 ? "s" : "");

  const sortedEvents = [...events].sort((a, b) => a.date.localeCompare(b.date));

  if (events.length === 0) {
    table.innerHTML = `<div class="empty-state"><p>No events yet. Click <strong>+ Add Event</strong> to get started.</p></div>`;
    updatePublishBar();
    return;
  }

  table.innerHTML = sortedEvents.map((ev, i) => {
    const d = new Date(ev.date + "T00:00:00");
    const realIndex = events.indexOf(ev);
    const color = CAT_COLORS[ev.category] || CAT_COLORS.other;
    const timeTxt = ev.time ? formatDisplayTime(ev.time) + (ev.endTime ? " – " + formatDisplayTime(ev.endTime) : "") : "All day";
    return `
    <div class="event-row">
      <div class="event-row-date">
        <div class="rm">${MONTHS_SHORT[d.getMonth()]}</div>
        <div class="rd">${d.getDate()}</div>
        <div class="ry">${d.getFullYear()}</div>
      </div>
      <div class="event-row-info">
        <div class="event-row-title">
          ${esc(ev.title)}
          <span class="cat-pill" style="background:${color}">${CAT_LABELS[ev.category] || ev.category}</span>
        </div>
        <div class="event-row-meta">🕐 ${timeTxt} &nbsp; 📍 ${esc(ev.location)}</div>
      </div>
      <div class="event-row-actions">
        <button class="icon-btn" onclick="openEditModal(${realIndex})" title="Edit">✏️</button>
        <button class="icon-btn delete" onclick="deleteEvent(${realIndex})" title="Delete">🗑️</button>
      </div>
    </div>`;
  }).join("");

  updatePublishBar();
}

function updatePublishBar() {
  const status = document.getElementById("publishStatus");
  const btn    = document.getElementById("publishBtn");
  if (isDirty) {
    status.innerHTML = `<strong>You have unsaved changes.</strong> <span class="unsaved-badge">Unpublished</span>`;
    btn.disabled = false;
  } else {
    status.innerHTML = `Events are live on the website. Make changes above, then publish.`;
    btn.disabled = false;
  }
}

// ─────────────────────────────────────────────
//  Delete Event
// ─────────────────────────────────────────────
function deleteEvent(index) {
  if (!confirm(`Delete "${events[index].title}"?`)) return;
  events.splice(index, 1);
  isDirty = true;
  renderEventTable();
}

// ─────────────────────────────────────────────
//  Add / Edit Modal
// ─────────────────────────────────────────────
document.getElementById("addEventBtn").addEventListener("click",   () => openAddModal());
document.getElementById("modalClose").addEventListener("click",    closeModal);
document.getElementById("modalCancelBtn").addEventListener("click", closeModal);
document.getElementById("modalOverlay").addEventListener("click", e => {
  if (e.target === document.getElementById("modalOverlay")) closeModal();
});

function openAddModal() {
  document.getElementById("modalTitle").textContent = "Add Event";
  document.getElementById("editIndex").value = "";
  document.getElementById("eventForm").reset();
  // Default date to today
  const t = new Date();
  document.getElementById("fDate").value = t.toISOString().slice(0, 10);
  openModal();
}

function openEditModal(index) {
  const ev = events[index];
  document.getElementById("modalTitle").textContent = "Edit Event";
  document.getElementById("editIndex").value = index;
  document.getElementById("fTitle").value    = ev.title    || "";
  document.getElementById("fDate").value     = ev.date     || "";
  document.getElementById("fCategory").value = ev.category || "";
  document.getElementById("fTime").value     = ev.time     ? to24h(ev.time)    : "";
  document.getElementById("fEndTime").value  = ev.endTime  ? to24h(ev.endTime) : "";
  document.getElementById("fLocation").value = ev.location || "";
  document.getElementById("fDesc").value     = ev.description || "";
  document.getElementById("fLink").value     = ev.link     || "";
  openModal();
}

function openModal() {
  document.getElementById("modalOverlay").classList.add("open");
  document.getElementById("fTitle").focus();
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
}

document.getElementById("eventForm").addEventListener("submit", e => {
  e.preventDefault();
  const title    = document.getElementById("fTitle").value.trim();
  const date     = document.getElementById("fDate").value;
  const category = document.getElementById("fCategory").value;
  const location = document.getElementById("fLocation").value.trim();

  if (!title || !date || !category || !location) {
    alert("Please fill in all required fields (Title, Date, Category, Location).");
    return;
  }

  const timeRaw    = document.getElementById("fTime").value;
  const endTimeRaw = document.getElementById("fEndTime").value;

  const ev = {
    title,
    date,
    time:        timeRaw    ? toAmPm(timeRaw)    : "",
    endTime:     endTimeRaw ? toAmPm(endTimeRaw) : "",
    location,
    category,
    description: document.getElementById("fDesc").value.trim(),
    link:        document.getElementById("fLink").value.trim(),
  };

  const editIndex = document.getElementById("editIndex").value;
  if (editIndex !== "") {
    events[parseInt(editIndex)] = ev;
  } else {
    events.push(ev);
  }

  isDirty = true;
  closeModal();
  renderEventTable();
});

// ─────────────────────────────────────────────
//  Publish
// ─────────────────────────────────────────────
document.getElementById("publishBtn").addEventListener("click", publishEvents);

async function publishEvents() {
  const btn = document.getElementById("publishBtn");
  btn.disabled = true;
  btn.textContent = "Publishing…";
  showBanner("info", "Saving events to the live site…");

  try {
    const res = await fetch(API_UPDATE, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-Admin-Pin": sessionPin,
      },
      body: JSON.stringify(events),
    });

    const data = await res.json();

    if (res.ok && data.success) {
      isDirty = false;
      renderEventTable();
      showBanner("success", `✅ Published! ${data.saved} event${data.saved !== 1 ? "s" : ""} are now live on the website.`);
    } else {
      showBanner("error", "❌ " + (data.error || "Publish failed. Check your PIN or try again."));
    }
  } catch (err) {
    showBanner("error", "❌ Network error: " + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "🚀 Publish Changes";
  }
}

// ─────────────────────────────────────────────
//  Change PIN
// ─────────────────────────────────────────────
document.getElementById("changePinBtn").addEventListener("click", async () => {
  const newPin     = document.getElementById("newPin").value.trim();
  const confirmPin = document.getElementById("confirmPin").value.trim();

  if (!newPin || newPin.length < 4) { alert("PIN must be at least 4 digits."); return; }
  if (!/^\d+$/.test(newPin))        { alert("PIN must contain digits only."); return; }
  if (newPin !== confirmPin)         { alert("PINs do not match."); return; }

  if (!confirm("Change the admin PIN? You'll need to share the new PIN with leadership.")) return;

  // The PIN lives in Netlify env — this informs admin they need to update it there
  alert(
    "To change the PIN:\n\n" +
    "1. Log in to app.netlify.com\n" +
    "2. Go to Site → Configuration → Environment Variables\n" +
    "3. Update ADMIN_PIN to: " + newPin + "\n" +
    "4. Redeploy the site (or it takes effect on next function call)\n\n" +
    "Your new PIN: " + newPin
  );

  document.getElementById("newPin").value = "";
  document.getElementById("confirmPin").value = "";
});

// ─────────────────────────────────────────────
//  Status Banner
// ─────────────────────────────────────────────
let bannerTimer;
function showBanner(type, msg) {
  const b = document.getElementById("statusBanner");
  b.className = "status-banner " + type;
  b.textContent = msg;
  clearTimeout(bannerTimer);
  if (type === "success") bannerTimer = setTimeout(hideBanner, 5000);
}
function hideBanner() {
  document.getElementById("statusBanner").className = "status-banner";
}

// ─────────────────────────────────────────────
//  Helpers
// ─────────────────────────────────────────────
function esc(str) {
  return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function toAmPm(time24) {
  const [h, m] = time24.split(":").map(Number);
  const period = h >= 12 ? "PM" : "AM";
  const h12 = h % 12 || 12;
  return `${h12}:${String(m).padStart(2,"0")} ${period}`;
}

function to24h(ampm) {
  const match = ampm.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if (!match) return "";
  let [, h, m, p] = match;
  h = parseInt(h);
  if (p.toUpperCase() === "PM" && h !== 12) h += 12;
  if (p.toUpperCase() === "AM" && h === 12) h = 0;
  return `${String(h).padStart(2,"0")}:${m}`;
}

function formatDisplayTime(t) {
  // If already AM/PM format, return as-is
  if (/AM|PM/i.test(t)) return t;
  return toAmPm(t);
}
