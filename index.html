<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grant Beach Neighborhood Association – Community Events</title>

  <!--
  ============================================================
  GRANT BEACH NEIGHBORHOOD ASSOCIATION — EVENTS PAGE
  ============================================================
  Events are managed by leadership through the admin panel at /admin.html.
  This page fetches live data from the /api/events endpoint (Netlify Blobs).

  WORDPRESS EMBED:
    Option A – Same-origin: Host on Netlify, embed with:
      <iframe src="https://YOUR-SITE.netlify.app/"
              width="100%" height="900" frameborder="0"
              style="border:none"></iframe>
    Option B – Custom HTML block: Paste this entire file into a
      WordPress "Custom HTML" block (the fetch will need CORS headers
      if the site is on a different domain — use the iframe approach
      if you run into issues).
  ============================================================
  -->

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f4f7f2;
      color: #2d3a2e;
      min-height: 100vh;
    }

    /* ── Header ── */
    .gb-header {
      background: linear-gradient(135deg, #2e6b35 0%, #3d8c45 60%, #56a65f 100%);
      color: #fff;
      padding: 2rem 1.5rem 1.5rem;
      text-align: center;
    }
    .gb-header h1 { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 700; letter-spacing: -.3px; }
    .gb-header p  { opacity: .85; margin-top: .4rem; font-size: .95rem; }

    /* ── Layout ── */
    .gb-wrap { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

    /* ── Loading ── */
    .gb-loading {
      text-align: center;
      padding: 3rem 1rem;
      color: #6b8c6e;
    }
    .gb-spinner {
      display: inline-block;
      width: 32px; height: 32px;
      border: 3px solid #d4e2d5;
      border-top-color: #2e6b35;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin-bottom: .75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Category legend ── */
    .gb-legend { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 1.25rem; }
    .gb-legend-item { display: flex; align-items: center; gap: .35rem; font-size: .78rem; color: #444; }
    .gb-legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* ── Calendar ── */
    .gb-cal-section { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; margin-bottom: 1.75rem; }
    .gb-cal-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: .85rem 1.25rem;
      background: #2e6b35; color: #fff;
    }
    .gb-cal-nav h2 { font-size: 1.05rem; font-weight: 600; }
    .gb-cal-nav button {
      background: rgba(255,255,255,.18); border: none; color: #fff;
      width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
      font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .gb-cal-nav button:hover { background: rgba(255,255,255,.32); }
    .gb-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
    .gb-cal-dow {
      padding: .5rem 0; text-align: center; font-size: .72rem;
      font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
      color: #6b8c6e; background: #f0f5f0;
    }
    .gb-cal-day {
      min-height: 72px; padding: .4rem .35rem .3rem;
      border-top: 1px solid #e8eee8; border-right: 1px solid #e8eee8;
      position: relative;
    }
    .gb-cal-day:nth-child(7n) { border-right: none; }
    .gb-cal-day.other-month { background: #fafbfa; }
    .gb-cal-day.other-month .gb-day-num { color: #c0c8c0; }
    .gb-cal-day.today { background: #eef7ef; }
    .gb-day-num { font-size: .8rem; font-weight: 600; color: #4a6b4c; line-height: 1; }
    .gb-cal-day.today .gb-day-num {
      background: #2e6b35; color: #fff; width: 22px; height: 22px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
    }
    .gb-cal-dots { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 4px; }
    .gb-cal-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
      cursor: pointer; transition: transform .1s;
    }
    .gb-cal-dot:hover { transform: scale(1.4); }
    .gb-cal-pill {
      font-size: .65rem; padding: 1px 5px; border-radius: 99px; color: #fff;
      line-height: 1.5; max-width: 100%; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap; cursor: pointer; margin-top: 2px;
    }

    /* ── List section ── */
    .gb-list-section { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; }
    .gb-list-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: .85rem 1.25rem; background: #2e6b35; color: #fff;
    }
    .gb-list-header h2 { font-size: 1.05rem; font-weight: 600; }
    .gb-filter-bar {
      display: flex; flex-wrap: wrap; gap: .5rem;
      padding: .85rem 1.25rem; border-bottom: 1px solid #e8eee8; background: #f8faf8;
    }
    .gb-filter-btn {
      padding: .3rem .75rem; border-radius: 99px; border: 1.5px solid #c8d8c9;
      background: #fff; color: #4a6b4c; font-size: .8rem; cursor: pointer; transition: all .15s;
    }
    .gb-filter-btn.active, .gb-filter-btn:hover { background: #2e6b35; color: #fff; border-color: #2e6b35; }
    .gb-events-list { padding: 0 1.25rem 1.25rem; }
    .gb-event-group-label {
      font-size: .72rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
      color: #7a9c7c; margin: 1.1rem 0 .5rem; padding-bottom: .25rem; border-bottom: 1px solid #e8eee8;
    }
    .gb-event-card {
      display: flex; gap: 1rem; padding: .85rem 0;
      border-bottom: 1px solid #f0f5f0; align-items: flex-start;
    }
    .gb-event-card:last-child { border-bottom: none; }
    .gb-event-date-badge {
      flex-shrink: 0; width: 50px; text-align: center;
      background: #f0f5f0; border-radius: 8px; padding: .4rem .2rem;
    }
    .gb-event-date-badge .badge-month { font-size: .65rem; font-weight: 700; text-transform: uppercase; color: #2e6b35; letter-spacing: .06em; }
    .gb-event-date-badge .badge-day   { font-size: 1.4rem; font-weight: 800; color: #2d3a2e; line-height: 1.1; }
    .gb-event-date-badge .badge-dow   { font-size: .6rem; color: #7a9c7c; text-transform: uppercase; }
    .gb-event-body { flex: 1; min-width: 0; }
    .gb-event-title {
      font-size: .95rem; font-weight: 700; color: #1e3320;
      display: flex; align-items: center; gap: .4rem; flex-wrap: wrap;
    }
    .gb-cat-badge { font-size: .65rem; padding: 2px 7px; border-radius: 99px; color: #fff; font-weight: 600; }
    .gb-event-meta { font-size: .8rem; color: #5a7c5c; margin-top: .2rem; }
    .gb-event-desc { font-size: .83rem; color: #556655; margin-top: .3rem; line-height: 1.5; }
    .gb-event-link {
      display: inline-block; margin-top: .45rem; font-size: .78rem;
      color: #2e6b35; font-weight: 600; text-decoration: none;
      border: 1.5px solid #2e6b35; padding: .2rem .6rem; border-radius: 99px; transition: all .15s;
    }
    .gb-event-link:hover { background: #2e6b35; color: #fff; }
    .gb-no-events { text-align: center; padding: 2.5rem 1rem; color: #7a9c7c; font-size: .9rem; }

    /* ── Tooltip ── */
    .gb-tooltip {
      position: fixed; z-index: 9999; background: #1e3320; color: #fff;
      border-radius: 8px; padding: .6rem .9rem; font-size: .8rem; max-width: 220px;
      box-shadow: 0 4px 16px rgba(0,0,0,.25); pointer-events: none; display: none;
    }
    .gb-tooltip.visible { display: block; }
    .gb-tooltip strong { display: block; font-size: .85rem; }

    /* ── Footer ── */
    .gb-footer { text-align: center; padding: 1rem; font-size: .75rem; color: #8aaa8c; }

    @media (max-width: 500px) {
      .gb-cal-day  { min-height: 52px; }
      .gb-cal-pill { display: none; }
    }
  </style>
</head>
<body>

<div class="gb-header">
  <h1>📅 Grant Beach Neighborhood Association</h1>
  <p>Community Events &amp; Activities</p>
</div>

<div class="gb-wrap">
  <div class="gb-legend" id="gbLegend"></div>

  <!-- Calendar -->
  <div class="gb-cal-section">
    <div class="gb-cal-nav">
      <button id="prevMonth" aria-label="Previous month">&#8249;</button>
      <h2 id="calTitle"></h2>
      <button id="nextMonth" aria-label="Next month">&#8250;</button>
    </div>
    <div class="gb-cal-grid" id="calGrid">
      <div class="gb-loading">
        <div class="gb-spinner"></div><br>Loading events…
      </div>
    </div>
  </div>

  <!-- Events List -->
  <div class="gb-list-section">
    <div class="gb-list-header"><h2>Upcoming Events</h2></div>
    <div class="gb-filter-bar" id="filterBar"></div>
    <div class="gb-events-list" id="eventsList">
      <div class="gb-loading"><div class="gb-spinner"></div><br>Loading events…</div>
    </div>
  </div>

  <div class="gb-footer">
    Updated daily &nbsp;·&nbsp; Grant Beach Neighborhood Association, Springfield, MO
  </div>
</div>

<div class="gb-tooltip" id="gbTooltip"></div>

<script>
// ── Config ──────────────────────────────────────────────────────────────
const API_URL = "/api/events";

const CATEGORIES = {
  meeting: { label: "Meeting",     color: "#2e6b35" },
  social:  { label: "Social",      color: "#e07b2a" },
  cleanup: { label: "Cleanup",     color: "#4a90a4" },
  safety:  { label: "Safety",      color: "#c0392b" },
  kids:    { label: "Kids/Family", color: "#8e44ad" },
  other:   { label: "Other",       color: "#7f8c8d" },
};

const MONTHS       = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const SHORT_MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS         = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const DOW_FULL     = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

// ── State ────────────────────────────────────────────────────────────────
const today = new Date();
let viewYear  = today.getFullYear();
let viewMonth = today.getMonth();
let activeFilter = "all";
let EVENTS = [];

// ── Helpers ──────────────────────────────────────────────────────────────
function parseDate(str) {
  const [y, m, d] = str.split("-").map(Number);
  return new Date(y, m - 1, d);
}
function toKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}
function catColor(cat) { return (CATEGORIES[cat] || CATEGORIES.other).color; }
function catLabel(cat) { return (CATEGORIES[cat] || CATEGORIES.other).label; }

// ── Legend ────────────────────────────────────────────────────────────────
function renderLegend() {
  document.getElementById("gbLegend").innerHTML =
    Object.entries(CATEGORIES).map(([,v]) =>
      `<div class="gb-legend-item">
        <div class="gb-legend-dot" style="background:${v.color}"></div>
        <span>${v.label}</span>
      </div>`
    ).join("");
}

// ── Calendar ──────────────────────────────────────────────────────────────
function renderCalendar() {
  document.getElementById("calTitle").textContent = `${MONTHS[viewMonth]} ${viewYear}`;
  const grid = document.getElementById("calGrid");
  grid.innerHTML = "";

  DAYS.forEach(d => {
    const cell = document.createElement("div");
    cell.className = "gb-cal-dow";
    cell.textContent = d;
    grid.appendChild(cell);
  });

  const lookup = {};
  EVENTS.forEach(ev => { (lookup[ev.date] = lookup[ev.date] || []).push(ev); });

  const firstDay    = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const prevDays    = new Date(viewYear, viewMonth, 0).getDate();
  const totalCells  = Math.ceil((firstDay + daysInMonth) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    const cell = document.createElement("div");
    cell.className = "gb-cal-day";
    let cellDate;
    if (i < firstDay)                   { cellDate = new Date(viewYear, viewMonth - 1, prevDays - firstDay + i + 1); cell.classList.add("other-month"); }
    else if (i >= firstDay + daysInMonth){ cellDate = new Date(viewYear, viewMonth + 1, i - firstDay - daysInMonth + 1); cell.classList.add("other-month"); }
    else                                 { cellDate = new Date(viewYear, viewMonth, i - firstDay + 1); }

    const key = toKey(cellDate);
    if (key === toKey(today)) cell.classList.add("today");

    const numDiv = document.createElement("div");
    numDiv.className = "gb-day-num";
    numDiv.textContent = cellDate.getDate();
    cell.appendChild(numDiv);

    if (lookup[key]) {
      const dotsDiv = document.createElement("div");
      dotsDiv.className = "gb-cal-dots";
      lookup[key].slice(0, 3).forEach(ev => {
        const pill = document.createElement("div");
        pill.className = "gb-cal-pill";
        pill.style.background = catColor(ev.category);
        pill.textContent = ev.title;
        pill.addEventListener("mouseenter", e => showTooltip(e, ev));
        pill.addEventListener("mouseleave", hideTooltip);
        cell.appendChild(pill);

        const dot = document.createElement("div");
        dot.className = "gb-cal-dot";
        dot.style.background = catColor(ev.category);
        dot.addEventListener("mouseenter", e => showTooltip(e, ev));
        dot.addEventListener("mouseleave", hideTooltip);
        dotsDiv.appendChild(dot);
      });
      if (lookup[key].length > 3) {
        const more = document.createElement("div");
        more.style.cssText = "font-size:.6rem;color:#7a9c7c;margin-top:2px;";
        more.textContent = `+${lookup[key].length - 3} more`;
        cell.appendChild(more);
      }
      cell.appendChild(dotsDiv);
    }
    grid.appendChild(cell);
  }
}

// ── Tooltip ───────────────────────────────────────────────────────────────
function showTooltip(e, ev) {
  const tip = document.getElementById("gbTooltip");
  tip.innerHTML = `<strong>${ev.title}</strong>${ev.time ? ev.time + (ev.endTime ? " – " + ev.endTime : "") + "<br>" : ""}<span style="opacity:.8">${ev.location}</span>`;
  tip.classList.add("visible");
  moveTip(e);
}
function moveTip(e) {
  const tip = document.getElementById("gbTooltip");
  tip.style.left = Math.min(e.clientX + 12, window.innerWidth - 240) + "px";
  tip.style.top  = Math.min(e.clientY + 12, window.innerHeight - 100) + "px";
}
function hideTooltip() { document.getElementById("gbTooltip").classList.remove("visible"); }
document.addEventListener("mousemove", e => {
  if (document.getElementById("gbTooltip").classList.contains("visible")) moveTip(e);
});

// ── Filter Bar ────────────────────────────────────────────────────────────
function renderFilterBar() {
  const usedCats = [...new Set(EVENTS.map(e => e.category))];
  const bar = document.getElementById("filterBar");
  bar.innerHTML =
    `<button class="gb-filter-btn ${activeFilter==="all"?"active":""}" data-cat="all">All Events</button>` +
    usedCats.map(c =>
      `<button class="gb-filter-btn ${activeFilter===c?"active":""}" data-cat="${c}">${catLabel(c)}</button>`
    ).join("");
  bar.querySelectorAll(".gb-filter-btn").forEach(btn => {
    btn.addEventListener("click", () => { activeFilter = btn.dataset.cat; renderFilterBar(); renderList(); });
  });
}

// ── List View ─────────────────────────────────────────────────────────────
function renderList() {
  const container = document.getElementById("eventsList");
  const todayMs = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();

  const filtered = EVENTS
    .filter(ev => parseDate(ev.date).getTime() >= todayMs)
    .filter(ev => activeFilter === "all" || ev.category === activeFilter)
    .sort((a, b) => parseDate(a.date) - parseDate(b.date));

  if (filtered.length === 0) {
    container.innerHTML = `<div class="gb-no-events">No upcoming events for this category. Check back soon!</div>`;
    return;
  }

  const groups = {};
  filtered.forEach(ev => {
    const d = parseDate(ev.date);
    const key = `${d.getFullYear()}-${d.getMonth()}`;
    (groups[key] = groups[key] || { label: `${MONTHS[d.getMonth()]} ${d.getFullYear()}`, events: [] }).events.push(ev);
  });

  container.innerHTML = Object.values(groups).map(group => `
    <div class="gb-event-group-label">${group.label}</div>
    ${group.events.map(ev => {
      const d = parseDate(ev.date);
      const color = catColor(ev.category);
      return `<div class="gb-event-card">
        <div class="gb-event-date-badge">
          <div class="badge-month">${SHORT_MONTHS[d.getMonth()]}</div>
          <div class="badge-day">${d.getDate()}</div>
          <div class="badge-dow">${DOW_FULL[d.getDay()].slice(0,3)}</div>
        </div>
        <div class="gb-event-body">
          <div class="gb-event-title">
            ${ev.title}
            <span class="gb-cat-badge" style="background:${color}">${catLabel(ev.category)}</span>
          </div>
          <div class="gb-event-meta">
            ${ev.time ? `🕐 ${ev.time}${ev.endTime ? " – " + ev.endTime : ""} &nbsp;` : ""}
            📍 ${ev.location}
          </div>
          ${ev.description ? `<div class="gb-event-desc">${ev.description}</div>` : ""}
          ${ev.link ? `<a class="gb-event-link" href="${ev.link}" target="_blank" rel="noopener">More Info →</a>` : ""}
        </div>
      </div>`;
    }).join("")}
  `).join("");
}

// ── Nav buttons ───────────────────────────────────────────────────────────
document.getElementById("prevMonth").addEventListener("click", () => {
  if (--viewMonth < 0) { viewMonth = 11; viewYear--; }
  renderCalendar();
});
document.getElementById("nextMonth").addEventListener("click", () => {
  if (++viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderCalendar();
});

// ── Init: Fetch events from API ───────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(API_URL + "?t=" + Date.now());
    if (!res.ok) throw new Error("HTTP " + res.status);
    EVENTS = await res.json();
  } catch (err) {
    console.warn("Could not load events from API:", err);
    EVENTS = [];
  }
  renderLegend();
  renderCalendar();
  renderFilterBar();
  renderList();
}

init();
</script>
</body>
</html>
